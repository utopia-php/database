name: Claude

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  workflow_run:
    workflows: [Tests]
    types: [completed]

jobs:
  claude:
    # Caller must grant the union of every permission the callee's jobs ask
    # for; reusable workflows can't exceed the caller's ceiling.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: abnegate/claude-pr-owner/.github/workflows/orchestrator.yml@c8a67b67d15c2ca57163c57f322352129c83544b # v0.3.0
    secrets:
      oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      improvement: true
      healing: true
      bots: true
      comments: true
